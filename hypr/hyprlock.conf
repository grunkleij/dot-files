source = $HOME/.config/hypr/macchiato.conf

# ==============================================================================
# Variables
# ==============================================================================
$accent      = $mauve
$accentAlpha = $mauveAlpha
$font        = FiraCode Nerd Font

# ==============================================================================
# General Settings
# ==============================================================================
general {
    hide_cursor = true
}

# ==============================================================================
# Background
# ==============================================================================
background {
    monitor     = eDP-1
    path        = $HOME/the-thing/wallpaper/maram.jpg
    blur_passes = 0
    color       = $base
    mode        = fit
}

# ==============================================================================
# Labels
# ==============================================================================
# Layout
label {
    monitor     =
    text        = Layout: $LAYOUT
    color       = $text
    font_size   = 25
    font_family = $font
    position    = 30, -30
    halign      = left
    valign      = top
}

# Time
label {
    monitor     =
    text        = $TIME
    color       = $text
    font_size   = 90
    font_family = $font
    position    = -30, 0
    halign      = right
    valign      = top
}

# Date
label {
    monitor     =
    text        = cmd[update:43200000] date +"%A, %d %B %Y"
    color       = $text
    font_size   = 25
    font_family = $font
    position    = -30, -150
    halign      = right
    valign      = top
}

# ==============================================================================
# User Avatar
# ==============================================================================
image {
    monitor      =
    path         = $HOME/.face
    size         = 100
    border_color = $accent
    position     = 0, 75
    halign       = center
    valign       = center
}

# ==============================================================================
# Input Field
# ==============================================================================
input-field {
    monitor           =
    size              = 300, 60
    
    # Border & Shape
    outline_thickness = 4
    rounding          = 1
    
    # Dots
    dots_size         = 0.2
    dots_spacing      = 0.2
    dots_center       = true
    
    # Colors
    outer_color       = $accent
    inner_color       = $surface0
    font_color        = $text
    check_color       = $accent
    fail_color        = $red
    capslock_color    = $yellow
    
    # Behavior
    fade_on_empty     = false
    hide_input        = false
    
    # Text Prompts
    placeholder_text  = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>
    
    # Placement
    position          = 0, -47
    halign            = center
    valign            = center
}
